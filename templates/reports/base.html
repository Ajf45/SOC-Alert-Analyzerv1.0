<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="author" content="SOC Alert Analyzer">

<meta name="generator" content="Python + Streamlit">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>{{ title }}</title>

<style>

@page{
    size:A4;

    margin: 18mm;
}

body{

    font-family:Arial,Helvetica,sans-serif;

    margin:40px;

    background:#f4f6f9;

    color:#222;

}

.container{

    max-width:1200px;

    margin:auto;

    background:white;

    padding:40px;

    border-radius:8px;

    box-shadow:0 0 10px rgba(0,0,0,.1);

}

h1{

    color:#c62828;

}

h2{

    border-bottom:2px solid #ddd;

    page-break-after:avoid;

    padding-bottom:8px;

    margin-top:35px;

}

table{

    width:100%;

    border-collapse:collapse;

    page-break-inside:avoid;

    margin-top:15px;

}

th{

    background:#37474f;

    color:white;

}

th,td{

    border:1px solid #ccc;

    padding:10px;

    text-align:left;

}

.footer{

    margin-top:50px;

    font-size:13px;

    color:gray;

    text-align:center;

}

</style>

</head>

<body>

<div class="container">

{% block content %}

{% endblock %}

<div class="footer">

Generated by SOC Alert Analyzer

</div>

</div>

</body>

</html>
